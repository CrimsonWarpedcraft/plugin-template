main: ${PACKAGE}.${NAME}
name: ${NAME}
version: "${VERSION}"
api-version: "26.1.2"
author: AUTHOR
description: DESCRIPTION
commands:
  example:
    description: Base command for EXAMPLE
    usage: /example <ping|greet>
permissions:
  example.use:
    description: Allows use of the /example command
    default: true
  example.*:
    description: Grants all other permissions
    default: false
    children:
      example.use: true